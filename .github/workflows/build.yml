name: Build

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name of the game:"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # checkout 최신 버전
      - uses: actions/checkout@v4

      # setup-java 최신 버전
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      # 입력 값을 환경변수로 받아 쓰면 sed가 깔끔합니다
      - name: Build with Gradle
        env:
          PKG: ${{ inputs.package_name }}
        run: |
          chmod +x ./gradlew
          # moduleDescription 앞에 "(패키지명) " 붙이기
          sed -i "s/moduleDescription = \"/moduleDescription = \"(${PKG}) /g" module.gradle
          # 헤더 내 패키지명 치환
          sed -i "s/com\.game\.packagename/${PKG}/g" module/src/main/cpp/game.h
          ./gradlew :module:assembleRelease

      # ⬇️ v3 -> v4 로 변경 (유일 필수 변경점)
      - uses: actions/upload-artifact@v4
        with:
          name: zygisk-il2cppdumper
          path: out/magisk_module_release/
          # 필요 시 보존일/압축설정 추가 가능
          # retention-days: 7
          # compression-level: 6
